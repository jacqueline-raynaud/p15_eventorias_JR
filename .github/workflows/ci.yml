name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Tests & Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # historique complet requis par l'analyse SonarCloud

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Restore google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > app/google-services.json

      - name: Restore local.properties
        run: echo "google.maps.key=${{ secrets.MAPS_API_KEY }}" > local.properties

      - name: Enable KVM (nécessaire pour l'émulateur)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Tests unitaires, tests instrumentés, couverture et quality gate
        uses: reactivecircus/android-emulator-runner@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          disable-animations: true
          script: ./gradlew testDebugUnitTest jacocoCombinedReport sonar -Dsonar.qualitygate.wait=true

      - name: Publier le rapport de tests unitaires
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/testDebugUnitTest

      - name: Publier le rapport de tests instrumentés
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-report
          path: app/build/reports/androidTests/connected
